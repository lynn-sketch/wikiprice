<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Deals — WikiPrice Uganda</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header"></div>

  <section class="section">
    <div class="container">
      <div id="geo-banner-slot"></div>
      <h1 class="section-title">Search Deals</h1>
      <form id="search-form" class="search-bar" style="max-width:100%;margin-bottom:24px;position:relative;" data-search-autocomplete>
        <input type="search" id="search-input" name="q" placeholder="office pants, television, engatto..." aria-label="Search">
        <button type="submit">Search</button>
        <div class="search-suggestions" id="search-input-suggestions"></div>
      </form>

      <div class="filters-layout">
        <aside class="filters-sidebar">
          <h3 style="margin:0 0 16px;">Filters</h3>
          <div class="filter-group">
            <label for="filter-price-type">Price Type</label>
            <select id="filter-price-type">
              <option value="all">All</option>
              <option value="retail">Retail Only</option>
              <option value="wholesale">Wholesale Only</option>
              <option value="both">Both</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-min-qty">Min Wholesale Qty</label>
            <select id="filter-min-qty">
              <option value="">Any</option>
              <option value="1-5">1–5 pieces</option>
              <option value="6-10">6–10 pieces</option>
              <option value="11-20">11–20 pieces</option>
              <option value="20+">Over 20</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-category">Category</label>
            <select id="filter-category"><option value="">All Categories</option></select>
          </div>
          <div class="filter-group">
            <label for="filter-subcategory">Sub-category</label>
            <select id="filter-subcategory"><option value="">All</option></select>
          </div>
          <div class="filter-group">
            <label for="filter-location">Location</label>
            <select id="filter-location"><option value="">All Locations</option></select>
          </div>
          <div class="filter-group">
            <label for="filter-verified">Verification</label>
            <select id="filter-verified">
              <option value="">All</option>
              <option value="verified">Verified Only</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-trust">Trust Score</label>
            <select id="filter-trust">
              <option value="">Any</option>
              <option value="90">90%+</option>
              <option value="75">75%+</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Price Range (UGX)</label>
            <input type="number" id="filter-min-price" placeholder="Min" min="0">
            <input type="number" id="filter-max-price" placeholder="Max" min="0" style="margin-top:8px;">
          </div>
          <div class="filter-group">
            <label for="filter-stock">Stock</label>
            <select id="filter-stock">
              <option value="">All</option>
              <option value="in-stock">In Stock Only</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-tiktok">TikTok</label>
            <select id="filter-tiktok">
              <option value="">Any</option>
              <option value="tiktok">Has TikTok</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-source">Source</label>
            <select id="filter-source">
              <option value="">All sources</option>
              <option value="tiktok">TikTok</option>
              <option value="instagram">Instagram</option>
              <option value="facebook">Facebook</option>
              <option value="jiji">Jiji</option>
              <option value="jumia">Jumia</option>
              <option value="in-person">In-person</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-sort">Sort By</label>
            <select id="filter-sort">
              <option value="newest">Newest First</option>
              <option value="nearest">Nearest (use location)</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="trust">Highest Trust</option>
            </select>
          </div>
          <button type="button" class="btn btn-primary btn-block" id="apply-filters">Apply Filters</button>
        </aside>

        <div>
          <p id="results-count" class="text-muted mb-16"></p>
          <div class="deals-grid" id="results-grid"></div>
          <p id="no-results" class="text-center text-muted hidden"></p>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/data-extended.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data-layer.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/images.js"></script>
  <script src="js/core.js"></script>
  <script src="js/components.js"></script>
  <script src="js/ui-enhance.js"></script>
  <script>
    document.getElementById('header').innerHTML = WPUI.header('search');
    document.getElementById('footer').innerHTML = WPUI.footer();
    WikiPrice.initGlobal();
    WPUIEnhance.initAllSearchBars();
    WPDataLayer.loadExtras();
    WPGeo.mountBanner(document.getElementById('geo-banner-slot'));

    document.getElementById('filter-sort').addEventListener('change', function () {
      if (this.value === 'nearest' && !WPGeo.userPos) {
        WPGeo.requestLocation(() => runSearch());
      }
    });

    const params = new URLSearchParams(location.search);
    const searchInput = document.getElementById('search-input');
    searchInput.value = params.get('q') || '';

    // Populate filter dropdowns
    Object.keys(WPDATA.categories).forEach(c => {
      document.getElementById('filter-category').innerHTML += '<option value="' + c + '">' + c + '</option>';
    });
    WPDATA.locations.forEach(l => {
      document.getElementById('filter-location').innerHTML += '<option value="' + l + '">' + l + '</option>';
    });

    document.getElementById('filter-category').addEventListener('change', function() {
      const subs = WikiPrice.getSubCategories(this.value);
      const sel = document.getElementById('filter-subcategory');
      sel.innerHTML = '<option value="">All</option>' + subs.map(s => '<option value="' + s + '">' + s + '</option>').join('');
    });

    function getFilters() {
      const f = {};
      const pt = document.getElementById('filter-price-type').value;
      if (pt && pt !== 'all') f.priceType = pt;
      const mq = document.getElementById('filter-min-qty').value;
      if (mq) f.minQty = mq;
      const cat = document.getElementById('filter-category').value;
      if (cat) f.category = cat;
      const sub = document.getElementById('filter-subcategory').value;
      if (sub) f.subCategory = sub;
      const loc = document.getElementById('filter-location').value;
      if (loc) f.location = loc;
      if (document.getElementById('filter-verified').value === 'verified') f.verifiedOnly = true;
      const trust = document.getElementById('filter-trust').value;
      if (trust) f.trustMin = parseInt(trust);
      const minP = document.getElementById('filter-min-price').value;
      const maxP = document.getElementById('filter-max-price').value;
      if (minP) f.minPrice = parseInt(minP);
      if (maxP) f.maxPrice = parseInt(maxP);
      if (document.getElementById('filter-stock').value === 'in-stock') f.inStockOnly = true;
      if (document.getElementById('filter-tiktok').value === 'tiktok') f.hasTiktok = true;
      const src = document.getElementById('filter-source').value;
      if (src) f.source = src;
      return f;
    }

    function runSearch() {
      const q = searchInput.value;
      const filters = getFilters();
      let results = WikiPrice.searchDeals(q, filters);
      results = WikiPrice.sortDeals(results, document.getElementById('filter-sort').value);
      results = results.filter(d => d.stockStatus !== 'out-of-stock');

      document.getElementById('results-count').textContent = results.length + ' deal' + (results.length !== 1 ? 's' : '') + ' found';
      const noRes = document.getElementById('no-results');
      if (results.length === 0) {
        noRes.classList.remove('hidden');
        noRes.innerHTML = WPUI.emptySearchState();
        document.getElementById('results-grid').innerHTML = '';
      } else {
        noRes.classList.add('hidden');
        document.getElementById('results-grid').innerHTML = results.map(d => WPUI.dealCard(d, { showWholesaleWarning: true })).join('');
      }

    document.getElementById('search-form').addEventListener('submit', e => { e.preventDefault(); runSearch(); });
    document.getElementById('apply-filters').addEventListener('click', runSearch);
    document.getElementById('filter-sort').addEventListener('change', runSearch);
    runSearch();
    window.addEventListener('load', () => WPUI.pageWeight());
  </script>
</body>
</html>
